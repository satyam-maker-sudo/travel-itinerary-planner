<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>User Login</h1>

<form method="POST">

name="username"

name="password"
placeholder="Enter Password"
required>

</button>

</form>

<a href="/register">
New User? Register Here
</a>

</div>

</body>

</html>
